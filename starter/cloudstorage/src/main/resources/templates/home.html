<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Home</title>
</head>

<body>

<h2>Home Page</h2>

<!-- ✅ Logout -->
<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<hr>

<!-- ✅ FILE UPLOAD -->
<form th:action="@{/file/upload}" method="post" enctype="multipart/form-data">
    <input type="file" id="fileUpload" name="fileUpload">
    <button id="uploadButton" type="submit">Upload</button>
</form>

<!-- ✅ FILE LIST -->
<h3>Files</h3>
<table>
    <tr th:each="file : ${files}">
        <td th:text="${file.filename}"></td>
        <td>
            <a th:href="@{'/file/download/' + ${file.fileid}}">Download</a>
            <a th:href="@{'/file/delete/' + ${file.fileid}}">Delete</a>
        </td>
    </tr>
</table>

<hr>

<!-- ✅ NOTES -->
<h3>Notes</h3>

<form th:action="@{/note}" method="post">
    <input type="hidden" name="noteid" id="note-id">

    <input type="text" name="notetitle" placeholder="Title">

    <input type="text" name="notedescription" placeholder="Description">

    <button type="submit">Save Note</button>
</form>

<ul>
    <li th:each="note : ${notes}">
        <span th:text="${note.notetitle}"></span>
        <a th:href="@{'/note/delete/' + ${note.noteid}}">Delete</a>
    </li>
</ul>

<hr>

<!-- ✅ CREDENTIALS -->
<h3>Credentials</h3>

<form th:action="@{/credential}" method="post">
    <input type="hidden" name="credentialid">

    <input type="text" name="url" placeholder="URL">
    <input type="text" name="username" placeholder="Username">
    <input type="text" name="password" placeholder="Password">

    <button type="submit">Save Credential</button>
</form>

<ul>
    <li th:each="cred : ${credentials}">
        <span th:text="${cred.url}"></span>
        <a th:href="@{'/credential/delete/' + ${cred.credentialid}}">Delete</a>
    </li>
</ul>

</body>
</html>
