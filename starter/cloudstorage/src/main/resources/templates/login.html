<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>

<body>

<h2>Login</h2>

<!-- ✅ Error Message -->
<div th:if="${param.error}" style="color:red;">
    Invalid username or password
</div>

<!-- ✅ Logout Message -->
<div th:if="${param.logout}" style="color:green;">
    You have been logged out
</div>

<!-- ✅ Signup Success -->
<div id="success-msg" th:if="${param.signupSuccess}" style="color:green;">
    You successfully signed up!
</div>

<!-- ✅ LOGIN FORM -->
<form th:action="@{/login}" method="post">

    <input type="text" id="inputUsername" name="username" placeholder="Username" required>

    <input type="password" id="inputPassword" name="password" placeholder="Password" required>

    <button id="login-button" type="submit">Login</button>

</form>

<br>

<a th:href="@{/signup}">Click here to sign up</a>

</body>
</html>
